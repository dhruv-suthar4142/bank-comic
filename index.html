<!DOCTYPE html>
<html>
<head>
    <title>My First Python Website</title>
    <style>
        body {
            text-align: center;
            background-color: lightblue;
            font-family: Arial;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Python Website 🚀</h1>
    <p>Click the button below</p>

    <button onclick="showMessage()">download</button>

    <p id="msg"></p>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText = "Hello from JavaScript!";
        }
    </script>

</body>
</html>
